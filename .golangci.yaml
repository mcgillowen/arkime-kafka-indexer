version: '2'
run:
  timeout: 5m
linters:
  enable:
  - wsl_v5
  disable:
  - noinlineerr
formatters:
  enable:
  - gci
  - gofmt
  - gofumpt
  - goimports
  settings:
    gci:
      sections:
      - standard
      - default
      - prefix(github.com/mcgillowen/arkime-kafka-indexer)
      - blank
      - dot
  exclusions:
    generated: lax
    paths:
    - third_party$
    - builtin$
    - examples$
linters-settings:
  wsl_v5:
    allow-first-in-block: true
    allow-whole-block: false
    branch-max-lines: 2
issues:
  exclude-use-default: true
