version: "2"
run:
  modules-download-mode: readonly
linters:
  default: all
  disable:
    - cyclop
    - depguard
    - exhaustruct
    - gocognit
    - lll
    - nlreturn
  settings:
    funlen:
      lines: 120
      statements: 70
    lll:
      line-length: 135
    nolintlint:
      require-explanation: true
      require-specific: true
    paralleltest:
      ignore-missing: true
    varnamelen:
      max-distance: 10
      ignore-names:
        - err
        - wg
        - ch
        - in
        - out
        - tt
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - funlen
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/mcgillowen/arkime-kafka-indexer)
        - blank
        - dot
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

# >>> appended by automation to ensure wsl_v5 enabled and noinlineerr disabled
run:
  timeout: 5m

linters:
  enable:
    - wsl_v5
  disable:
    - noinlineerr

linters-settings:
  wsl_v5:
    allow-first-in-block: true
    allow-whole-block: false
    branch-max-lines: 2

issues:
  exclude-use-default: true
# <<< end appended block
